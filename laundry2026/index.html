<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laundry 2026 | Espacio Abierto</title>
  <meta name="description" content="Galería fotográfica del evento Laundry 2026." />

    <!-- Favicons -->
  <link href="./assets/img/favicon.png" rel="icon">

  <link rel="stylesheet" href="./assets/css/laundry2026.css" />
</head>
<body>
  <div class="gallery-page">
    <header class="gallery-hero-lite">
    <div class="gallery-hero-lite__inner">
        
        <div class="gallery-hero-lite__top">
        <a href="/" class="gallery-back">← Volver a Espacio Abierto</a>
        </div>

        <h1 class="gallery-title">
        <span>Evento Laundry</span>
        <span>2026</span>
        </h1>

    </div>
    </header>

    <main class="gallery-main">
      <section class="gallery-intro">
        <div class="gallery-intro__text">
        </div>
      </section>

      <section class="gallery-grid-wrap">
        <div class="gallery-grid" id="galleryGrid"></div>
      </section>
    </main>

    <div class="lightbox" id="lightbox" aria-hidden="true">
      <div class="lightbox__backdrop" id="lightboxBackdrop"></div>

      <button class="lightbox__close" id="lightboxClose" aria-label="Cerrar">
        ✕
      </button>

      <button class="lightbox__nav lightbox__nav--prev" id="lightboxPrev" aria-label="Imagen anterior">
        ‹
      </button>

      <div class="lightbox__content">
        <img id="lightboxImage" class="lightbox__image" src="" alt="" />
      </div>

      <button class="lightbox__nav lightbox__nav--next" id="lightboxNext" aria-label="Siguiente imagen">
        ›
      </button>
    </div>
  </div>

  <script src="./assets/js/laundry2026.js"></script>
</body>
</html>
